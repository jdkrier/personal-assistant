<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOOSE</title>
  <style>
    :root {
      --bg:        #06080c;
      --card:      #0d1219;
      --border:    #18222e;
      --cyan:      #00d4ff;
      --cyan-dim:  #006f88;
      --cyan-glow: rgba(0,212,255,0.12);
      --amber:     #ffaa00;
      --red:       #ff3355;
      --green:     #00ff99;
      --text:      #9ab4cc;
      --text-dim:  #3a5568;
      --text-hi:   #d4e8ff;
      --mono:      'SF Mono','Fira Code','Courier New',monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow-x: hidden;
    }

    /* Background grid — moves with parallax via JS */
    #grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
      will-change: background-position;
    }

    /* Scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.055) 3px, rgba(0,0,0,0.055) 4px
      );
      pointer-events: none;
      z-index: 9998;
    }

    /* ── STICKY HEADER ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 40px;
      background: rgba(6,8,12,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .logo-group { display: flex; align-items: center; gap: 14px; }

    .diamond {
      width: 10px; height: 10px;
      background: var(--cyan);
      transform: rotate(45deg);
      box-shadow: 0 0 16px var(--cyan), 0 0 32px var(--cyan-glow);
      flex-shrink: 0;
    }

    .logo-text {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.28em;
      color: var(--cyan);
      text-shadow: 0 0 24px var(--cyan-glow);
    }

    .logo-sub {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.18em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-top: 3px;
    }

    .header-right { display: flex; align-items: center; gap: 32px; }

    .sys-status {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.14em;
      color: var(--text);
      text-transform: uppercase;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: breathe 2.4s ease-in-out infinite;
    }
    .status-dot.warn  { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
    .status-dot.error { background: var(--red);   box-shadow: 0 0 8px var(--red); animation: none; }

    @keyframes breathe {
      0%,100% { opacity:1; box-shadow: 0 0 8px var(--green); }
      50%      { opacity:.4; box-shadow: 0 0 3px var(--green); }
    }

    .clock {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text);
      letter-spacing: 0.1em;
    }

    /* ── SCROLL SECTIONS ── */
    .section {
      position: relative;
      z-index: 1;
      padding: 80px 40px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .section + .section {
      border-top: 1px solid var(--border);
    }

    /* ── REVEAL ANIMATIONS ── */
    .reveal {
      opacity: 0;
      transform: translateY(48px);
      transition: opacity 0.8s cubic-bezier(0.16,1,0.3,1),
                  transform 0.8s cubic-bezier(0.16,1,0.3,1);
    }
    .reveal.from-left  { transform: translateX(-60px); }
    .reveal.from-right { transform: translateX(60px); }
    .reveal.from-below { transform: translateY(60px); }

    .reveal.visible {
      opacity: 1;
      transform: translate(0);
    }

    /* stagger children */
    .stagger > * { opacity:0; transform:translateY(24px); transition: opacity 0.6s cubic-bezier(0.16,1,0.3,1), transform 0.6s cubic-bezier(0.16,1,0.3,1); }
    .stagger.visible > *:nth-child(1) { opacity:1; transform:none; transition-delay: 0.05s; }
    .stagger.visible > *:nth-child(2) { opacity:1; transform:none; transition-delay: 0.15s; }
    .stagger.visible > *:nth-child(3) { opacity:1; transform:none; transition-delay: 0.25s; }
    .stagger.visible > *:nth-child(4) { opacity:1; transform:none; transition-delay: 0.35s; }
    .stagger.visible > *:nth-child(5) { opacity:1; transform:none; transition-delay: 0.45s; }
    .stagger.visible > *:nth-child(n+6) { opacity:1; transform:none; transition-delay: 0.55s; }

    /* ── PANEL ── */
    .panel {
      position: relative;
      background: var(--card);
      border: 1px solid var(--border);
      padding: 28px 32px;
    }

    .panel::before { content:''; position:absolute; top:-1px; left:-1px; width:16px; height:16px; border-top:2px solid var(--cyan); border-left:2px solid var(--cyan); }
    .panel::after  { content:''; position:absolute; bottom:-1px; right:-1px; width:16px; height:16px; border-bottom:2px solid var(--cyan); border-right:2px solid var(--cyan); }
    .panel .c-tr   { position:absolute; top:-1px; right:-1px; width:16px; height:16px; border-top:2px solid var(--cyan); border-right:2px solid var(--cyan); }
    .panel .c-bl   { position:absolute; bottom:-1px; left:-1px; width:16px; height:16px; border-bottom:2px solid var(--cyan); border-left:2px solid var(--cyan); }

    .panel-label {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .panel-label::after { content:''; flex:1; height:1px; background: var(--border); }

    /* ── HERO BRIEF ── */
    .hero-eyebrow {
      font-family: var(--mono);
      font-size: 13px;
      letter-spacing: 0.22em;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .hero-eyebrow::before { content:''; width:32px; height:1px; background:var(--cyan); }

    .brief-text {
      font-size: clamp(22px, 3vw, 36px);
      font-weight: 300;
      color: var(--text-hi);
      line-height: 1.5;
      max-width: 800px;
      margin-bottom: 48px;
    }

    .readouts {
      display: flex;
      gap: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .readout { display:flex; flex-direction:column; gap:6px; }
    .readout-label { font-family:var(--mono); font-size:12px; letter-spacing:0.18em; color:var(--text); text-transform:uppercase; }
    .readout-value { font-family:var(--mono); font-size:16px; color:var(--cyan); letter-spacing:0.05em; }

    .loading-state { padding: 60px 0; }
    .loading-state p {
      font-family: var(--mono);
      font-size: 14px;
      color: var(--text-dim);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      animation: flicker 1.4s step-end infinite;
    }
    @keyframes flicker { 0%,100%{opacity:1} 50%{opacity:.12} }

    /* ── DATA GRID ── */
    .data-grid {
      display: grid;
      grid-template-columns: 1.3fr 1fr 1fr;
      gap: 24px;
      align-items: start;
    }
    @media (max-width: 900px) { .data-grid { grid-template-columns: 1fr; } }

    /* section eyebrow */
    .section-eyebrow {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.22em;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .section-eyebrow::before { content:''; width:32px; height:1px; background:var(--cyan-dim); }

    /* ── ASSIGNMENTS ── */
    .a-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 13px 0;
      border-bottom: 1px solid var(--border);
    }
    .a-row:last-child { border-bottom: none; }

    .badge {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 10px;
      border: 1px solid;
      min-width: 84px;
      text-align: center;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .b-crit { color:var(--red);    border-color:var(--red);   background:rgba(255,51,85,.07);  animation: pulse-red 2s ease-in-out infinite; }
    .b-high { color:var(--amber);  border-color:var(--amber); background:rgba(255,170,0,.06); }
    .b-elev { color:#ffaa44;         border-color:#664400; }
    .b-mod  { color:#44aacc;         border-color:#0a3a4a; }
    .b-rout { color:#6a8899;         border-color:var(--border); }

    @keyframes pulse-red {
      0%,100% { box-shadow:0 0 8px rgba(255,51,85,.12); }
      50%      { box-shadow:0 0 18px rgba(255,51,85,.4); }
    }

    .a-info { flex:1; min-width:0; }
    .a-name { font-size:14px; color:var(--text-hi); line-height:1.35; margin-bottom:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .a-due  { font-family:var(--mono); font-size:12px; color:var(--text-dim); letter-spacing:.06em; }
    .a-due.crit { color:var(--red); }
    .a-due.high { color:var(--amber); }

    /* ── SCHEDULE ── */
    .e-row {
      display: flex; gap:16px; padding:11px 0;
      border-bottom: 1px solid var(--border);
      align-items: flex-start;
    }
    .e-row:last-child { border-bottom: none; }
    .e-time  { font-family:var(--mono); font-size:12px; color:var(--cyan-dim); min-width:50px; flex-shrink:0; padding-top:1px; letter-spacing:.06em; }
    .e-title { font-size:14px; color:var(--text-hi); line-height:1.3; }

    /* ── FREE BLOCKS ── */
    .b-row {
      display: flex; align-items:center; gap:14px;
      padding:12px 0; border-bottom:1px solid var(--border);
    }
    .b-row:last-child { border-bottom:none; }
    .b-time  { font-family:var(--mono); font-size:12px; color:var(--text); letter-spacing:.04em; min-width:130px; flex-shrink:0; }
    .b-track { flex:1; height:2px; background:var(--border); }
    .b-fill  { height:100%; background:var(--cyan); box-shadow:0 0 8px var(--cyan); transition: width 1s cubic-bezier(0.16,1,0.3,1); }
    .b-hrs   { font-family:var(--mono); font-size:12px; color:var(--green); letter-spacing:.06em; min-width:30px; text-align:right; }

    .empty {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: .14em;
      text-transform: uppercase;
      padding: 12px 0;
    }

    /* ── FOOTER ── */
    .site-footer {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      border-top: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    /* scroll hint */
    .scroll-hint {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      text-transform: uppercase;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      animation: hint-fade 3s ease-in-out 2s forwards;
    }
    .scroll-hint::after {
      content: '';
      width: 1px;
      height: 32px;
      background: linear-gradient(to bottom, var(--text-dim), transparent);
      animation: drop 1.6s ease-in-out infinite;
    }
    @keyframes drop {
      0%   { transform: scaleY(0); transform-origin: top; }
      50%  { transform: scaleY(1); transform-origin: top; }
      51%  { transform: scaleY(1); transform-origin: bottom; }
      100% { transform: scaleY(0); transform-origin: bottom; }
    }
    @keyframes hint-fade { to { opacity: 0; pointer-events: none; } }

    /* ── WEATHER BAR ─────────────────────────────────────────────────────── */
    #atmos-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      margin-top: 28px;
      border: 1px solid rgba(0,212,255,0.18);
      background: rgba(0,212,255,0.03);
      width: fit-content;
      max-width: 100%;
    }
    .atmos-cell {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 10px 18px;
      border-right: 1px solid rgba(0,212,255,0.12);
    }
    .atmos-cell:last-child { border-right: none; }
    .atmos-lbl {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      text-transform: uppercase;
    }
    .atmos-val {
      font-family: var(--mono);
      font-size: 15px;
      color: var(--cyan);
      letter-spacing: 0.06em;
      white-space: nowrap;
    }
    .atmos-val.dim { color: var(--text); font-size: 13px; }

    #jets-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── CHAT PANEL ──────────────────────────────────────────────────────── */
    #chat-toggle {
      position: fixed;
      bottom: 28px;
      right: 32px;
      z-index: 200;
      background: rgba(0,212,255,0.08);
      border: 1px solid rgba(0,212,255,0.45);
      color: var(--cyan);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.12em;
      padding: 9px 18px;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    }
    #chat-toggle:hover,
    #chat-toggle.active {
      background: rgba(0,212,255,0.18);
      box-shadow: 0 0 14px rgba(0,212,255,0.35);
    }

    #chat-panel {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(100%);
      width: min(720px, 94vw);
      height: 420px;
      z-index: 190;
      display: flex;
      flex-direction: column;
      background: rgba(6,8,12,0.96);
      border: 1px solid rgba(0,212,255,0.35);
      border-bottom: none;
      transition: transform 0.35s cubic-bezier(0.22,1,0.36,1);
    }
    #chat-panel::before,
    #chat-panel::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      border-color: var(--cyan);
      border-style: solid;
      opacity: 0.7;
    }
    #chat-panel::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
    #chat-panel::after  { top: -1px; right: -1px; border-width: 1px 1px 0 0; }
    #chat-panel.open { transform: translateX(-50%) translateY(0); }

    #chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid rgba(0,212,255,0.18);
      flex-shrink: 0;
    }
    #chat-header span {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.18em;
      color: var(--cyan);
    }
    #chat-close {
      background: none;
      border: none;
      color: rgba(0,212,255,0.5);
      font-family: var(--mono);
      font-size: 11px;
      cursor: pointer;
      letter-spacing: 0.1em;
      padding: 0;
    }
    #chat-close:hover { color: var(--cyan); }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scrollbar-width: thin;
      scrollbar-color: rgba(0,212,255,0.2) transparent;
    }

    .chat-msg {
      display: flex;
      flex-direction: column;
      gap: 3px;
      max-width: 88%;
    }
    .chat-msg.user  { align-self: flex-end; align-items: flex-end; }
    .chat-msg.goose { align-self: flex-start; align-items: flex-start; }

    .chat-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      opacity: 0.45;
    }
    .chat-msg.user  .chat-label { color: #ccc; }
    .chat-msg.goose .chat-label { color: var(--cyan); }

    .chat-bubble {
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.6;
      padding: 9px 13px;
      border-radius: 2px;
    }
    .chat-msg.user .chat-bubble {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: #e0e6ed;
    }
    .chat-msg.goose .chat-bubble {
      background: rgba(0,212,255,0.06);
      border: 1px solid rgba(0,212,255,0.22);
      color: #c8eeff;
    }

    .chat-cursor {
      display: inline-block;
      width: 7px;
      height: 13px;
      background: var(--cyan);
      vertical-align: text-bottom;
      animation: blink 0.9s step-end infinite;
      margin-left: 2px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    #chat-input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-top: 1px solid rgba(0,212,255,0.18);
      flex-shrink: 0;
    }
    #chat-input-row span {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--cyan);
      opacity: 0.6;
    }
    #chat-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: var(--mono);
      font-size: 13px;
      color: #e0e6ed;
      caret-color: var(--cyan);
    }
    #chat-input::placeholder { color: rgba(255,255,255,0.2); }
    #chat-send {
      background: none;
      border: 1px solid rgba(0,212,255,0.35);
      color: var(--cyan);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      padding: 5px 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    #chat-send:hover { background: rgba(0,212,255,0.12); }
    #chat-send:disabled { opacity: 0.3; cursor: default; }
  </style>
</head>
<body>

<div id="grid-bg"></div>
<canvas id="jets-canvas"></canvas>

<header>
  <div class="logo-group">
    <div class="diamond"></div>
    <div>
      <div class="logo-text">GOOSE</div>
      <div class="logo-sub">Personal Co-Pilot · v1.0</div>
    </div>
  </div>
  <div class="header-right">
    <div class="sys-status">
      <div class="status-dot" id="sys-dot"></div>
      <span id="sys-label">Nominal</span>
    </div>
    <div class="clock" id="clock"></div>
  </div>
</header>

<!-- HERO: Mission Brief -->
<section class="section" id="hero-section">
  <div class="hero-eyebrow reveal">Mission Brief</div>
  <div id="brief" class="reveal" style="transition-delay:0.1s"></div>
  <div id="atmos-bar" class="reveal" style="transition-delay:0.25s"></div>
  <div class="scroll-hint" id="scroll-hint">Scroll</div>
</section>

<!-- DATA: Assignments + Schedule + Free Blocks -->
<section class="section" id="data-section">
  <div class="section-eyebrow reveal">Daily Intelligence</div>
  <div class="data-grid">
    <div class="panel reveal from-left" style="transition-delay:0.05s">
      <div class="c-tr"></div><div class="c-bl"></div>
      <div class="panel-label">Assignments</div>
      <div id="assignments" class="stagger"></div>
    </div>
    <div class="panel reveal" style="transition-delay:0.2s">
      <div class="c-tr"></div><div class="c-bl"></div>
      <div class="panel-label">Schedule</div>
      <div id="events" class="stagger"></div>
    </div>
    <div class="panel reveal from-right" style="transition-delay:0.35s">
      <div class="c-tr"></div><div class="c-bl"></div>
      <div class="panel-label">Free Blocks</div>
      <div id="blocks" class="stagger"></div>
    </div>
  </div>
</section>

<footer class="site-footer">
  <span>Local · ASU Canvas + Google Calendar</span>
  <span id="last-update"></span>
</footer>

<script>
  const $ = id => document.getElementById(id);

  // ── Parallax grid ──
  window.addEventListener('scroll', () => {
    const y = window.scrollY;
    document.getElementById('grid-bg').style.backgroundPosition = `0 ${y * 0.3}px`;
  }, { passive: true });

  // ── Intersection Observer — pendulum: slide in on entry, slide out on exit ──
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
      } else {
        e.target.classList.remove('visible');
      }
    });
  }, { threshold: 0.12 });

  document.querySelectorAll('.reveal, .stagger').forEach(el => io.observe(el));

  // Trigger hero on load
  window.addEventListener('load', () => {
    setTimeout(() => {
      document.querySelectorAll('#hero-section .reveal').forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), i * 120);
      });
    }, 200);
  });

  // Hide scroll hint once user scrolls
  window.addEventListener('scroll', () => {
    const hint = $('scroll-hint');
    if (hint && window.scrollY > 40) hint.style.opacity = '0';
  }, { passive: true, once: true });

  // ── Live clock ──
  const DAYS   = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  function tick() {
    const n = new Date();
    $('clock').textContent =
      `${DAYS[n.getDay()]} ${String(n.getDate()).padStart(2,'0')} ${MONTHS[n.getMonth()]} ${n.getFullYear()}` +
      `  ·  ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;
  }
  tick(); setInterval(tick, 1000);

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function badge(days) {
    if (days <= 0) return ['CRITICAL','b-crit'];
    if (days === 1) return ['HIGH','b-high'];
    if (days <= 3) return ['ELEVATED','b-elev'];
    if (days <= 7) return ['MODERATE','b-mod'];
    return ['ROUTINE','b-rout'];
  }

  function dueStr(days) {
    if (days < 0)   return `T${days}  OVERDUE`;
    if (days === 0) return 'T+0  DUE TODAY';
    if (days === 1) return 'T+1  TOMORROW';
    return `T+${days}  DAYS OUT`;
  }

  function dueClass(days) {
    if (days <= 0) return 'crit';
    if (days <= 1) return 'high';
    return '';
  }

  function fmtTime(iso) {
    if (!iso || !iso.includes('T')) return '';
    try {
      const d = new Date(iso);
      return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    } catch { return ''; }
  }

  function render(data) {
    const dot = $('sys-dot'), lbl = $('sys-label');

    if (data.status === 'loading') {
      dot.className = 'status-dot warn';
      lbl.textContent = 'Initializing';
      $('brief').innerHTML = `<div class="loading-state"><p>Acquiring data streams_</p></div>`;
      ['assignments','events','blocks'].forEach(id => $(id).innerHTML = '');
      return;
    }

    dot.className = data.status === 'error' ? 'status-dot error' : 'status-dot';
    lbl.textContent = data.status === 'error' ? 'System Error' : 'Nominal';

    // Brief
    const h = data.headline;
    if (h?.headline) {
      $('brief').innerHTML = `
        <div class="brief-text">${esc(h.headline)}</div>
        <div class="readouts">
          ${h.priority_task   ? `<div class="readout"><div class="readout-label">Priority Target</div><div class="readout-value">${esc(h.priority_task)}</div></div>` : ''}
          ${h.suggested_block ? `<div class="readout"><div class="readout-label">Suggested Window</div><div class="readout-value">${esc(h.suggested_block)}</div></div>` : ''}
        </div>`;
    } else {
      $('brief').innerHTML = `<div class="loading-state"><p>Computing recommendation_</p></div>`;
    }

    // Weather bar
    const w = data.weather;
    if (w) {
      function fmtSun(hhmm) {
        const [h, m] = hhmm.split(':').map(Number);
        const ampm = h < 12 ? 'AM' : 'PM';
        const disp = h % 12 || 12;
        return `${disp}:${String(m).padStart(2,'0')} ${ampm}`;
      }
      const uvColor = w.uv_index >= 8 ? '#ff4444'
                    : w.uv_index >= 6 ? '#ffaa44'
                    : w.uv_index >= 3 ? '#ffdd44' : 'var(--cyan)';
      $('atmos-bar').innerHTML = `
        <div class="atmos-cell">
          <div class="atmos-lbl">Temp</div>
          <div class="atmos-val">${w.temp_f}°F</div>
        </div>
        <div class="atmos-cell">
          <div class="atmos-lbl">Feels Like</div>
          <div class="atmos-val dim">${w.feels_like_f}°F</div>
        </div>
        <div class="atmos-cell">
          <div class="atmos-lbl">Conditions</div>
          <div class="atmos-val">${esc(w.condition)}</div>
        </div>
        <div class="atmos-cell">
          <div class="atmos-lbl">Wind</div>
          <div class="atmos-val dim">${w.wind_mph} MPH ${esc(w.wind_dir)}</div>
        </div>
        <div class="atmos-cell">
          <div class="atmos-lbl">UV Index</div>
          <div class="atmos-val" style="color:${uvColor}">${w.uv_index}</div>
        </div>
        <div class="atmos-cell">
          <div class="atmos-lbl">Sunrise</div>
          <div class="atmos-val dim">${fmtSun(w.sunrise)}</div>
        </div>
        <div class="atmos-cell">
          <div class="atmos-lbl">Sunset</div>
          <div class="atmos-val dim">${fmtSun(w.sunset)}</div>
        </div>`;
    }

    // Assignments
    const asgn = data.assignments || [];
    $('assignments').innerHTML = asgn.length === 0
      ? `<div class="empty">No assignments on deck</div>`
      : asgn.map(a => {
          const [bl, bc] = badge(a.days_until_due);
          return `<div class="a-row">
            <div class="badge ${bc}">${bl}</div>
            <div class="a-info">
              <div class="a-name">${esc(a.name)}</div>
              <div class="a-due ${dueClass(a.days_until_due)}">${dueStr(a.days_until_due)}</div>
            </div>
          </div>`;
        }).join('');

    // Events
    const evts = data.events || [];
    $('events').innerHTML = evts.length === 0
      ? `<div class="empty">No events scheduled</div>`
      : evts.map(e => `
          <div class="e-row">
            <div class="e-time">${fmtTime(e.start)}</div>
            <div class="e-title">${esc(e.title)}</div>
          </div>`).join('');

    // Free blocks
    const blks = data.free_blocks || [];
    const maxH = Math.max(...blks.map(b => b.hours), 1);
    $('blocks').innerHTML = blks.length === 0
      ? `<div class="empty">No free blocks today</div>`
      : blks.map(b => `
          <div class="b-row">
            <div class="b-time">${esc(b.start)} – ${esc(b.end)}</div>
            <div class="b-track"><div class="b-fill" style="width:${Math.round(b.hours/maxH*100)}%"></div></div>
            <div class="b-hrs">${b.hours}h</div>
          </div>`).join('');

    // Re-observe stagger containers after content update
    document.querySelectorAll('.stagger').forEach(el => {
      el.classList.remove('visible');
      io.observe(el);
    });

    if (data.generated_at) {
      const d = new Date(data.generated_at);
      $('last-update').textContent = `Last sync  ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }
  }

  async function poll() {
    try {
      render(await (await fetch('/api/data')).json());
    } catch {
      $('sys-dot').className = 'status-dot error';
      $('sys-label').textContent = 'Offline';
    }
  }

  poll();
  setInterval(poll, 60_000);

  // ── JET ANIMATION ──────────────────────────────────────────────────────────
  (function () {
    const canvas = document.getElementById('jets-canvas');
    const ctx = canvas.getContext('2d');
    const DEG = Math.PI / 180;
    const TRAIL_LIFE = 15000; // ms
    const MAX_JETS   = 2;

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize, { passive: true });

    // ── normalise angle to (-π, π] ──
    function normAngle(a) {
      a = a % (Math.PI * 2);
      if (a >  Math.PI) a -= Math.PI * 2;
      if (a < -Math.PI) a += Math.PI * 2;
      return a;
    }

    // ── draw the jet silhouette centred at origin, pointing right ──
    function drawJetShape(ctx) {
      // fuselage
      ctx.beginPath();
      ctx.moveTo( 11,  0);
      ctx.lineTo(  2, -1.5);
      ctx.lineTo( -5, -2);
      ctx.lineTo( -9,  0);
      ctx.lineTo( -5,  2);
      ctx.lineTo(  2,  1.5);
      ctx.closePath();
      ctx.fill();
      // left wing
      ctx.beginPath();
      ctx.moveTo(  1, -1.5);
      ctx.lineTo( -2, -10);
      ctx.lineTo( -6, -10);
      ctx.lineTo( -5, -2);
      ctx.closePath();
      ctx.fill();
      // right wing
      ctx.beginPath();
      ctx.moveTo(  1,  1.5);
      ctx.lineTo( -2,  10);
      ctx.lineTo( -6,  10);
      ctx.lineTo( -5,  2);
      ctx.closePath();
      ctx.fill();
      // upper tail fin
      ctx.beginPath();
      ctx.moveTo(-5, -1.5);
      ctx.lineTo(-8.5, -5);
      ctx.lineTo(-9,  0);
      ctx.closePath();
      ctx.fill();
      // lower tail fin
      ctx.beginPath();
      ctx.moveTo(-5,  1.5);
      ctx.lineTo(-8.5,  5);
      ctx.lineTo(-9,  0);
      ctx.closePath();
      ctx.fill();
    }

    // ── Jet class ──
    class Jet {
      constructor(now) {
        const W = canvas.width, H = canvas.height;
        const edge = Math.floor(Math.random() * 4);
        const m = 40; // spawn margin off screen

        if (edge === 0) {       // left → right
          this.x = -m; this.y = H * (0.15 + Math.random() * 0.7);
          this.heading = normAngle((-20 + Math.random() * 40) * DEG);
        } else if (edge === 1) { // right → left
          this.x = W + m; this.y = H * (0.15 + Math.random() * 0.7);
          this.heading = normAngle((180 + (-20 + Math.random() * 40)) * DEG);
        } else if (edge === 2) { // top → bottom
          this.x = W * (0.15 + Math.random() * 0.7); this.y = -m;
          this.heading = normAngle((90 + (-20 + Math.random() * 40)) * DEG);
        } else {                  // bottom → top
          this.x = W * (0.15 + Math.random() * 0.7); this.y = H + m;
          this.heading = normAngle((-90 + (-20 + Math.random() * 40)) * DEG);
        }

        this.speed       = 110 + Math.random() * 110; // px / sec
        // max sustained turn rate: 14–28 deg/sec → sweeping arcs, not tight circles
        this.maxTurnRate = (14 + Math.random() * 14) * DEG;
        // continuous angular velocity — starts with a gentle random bank
        this.turnRate    = (Math.random() - 0.5) * this.maxTurnRate;
        // target turn rate drifts slowly via random walk
        this.turnTarget  = (Math.random() - 0.5) * this.maxTurnRate * 2;
        this.nextDrift   = now + (0.8 + Math.random() * 1.8) * 1000;

        this.trail       = []; // { x, y, t }
        this.sampleTimer = 0;
        this.offscreenMs = 0;
        this.alive       = true;
      }

      update(dt, now) {
        // ── continuously drift turnRate toward turnTarget ──
        const diff = this.turnTarget - this.turnRate;
        // approach at ~2× maxTurnRate per second so changes feel fluid
        const step = this.maxTurnRate * 2 * dt;
        this.turnRate += Math.abs(diff) < step ? diff : Math.sign(diff) * step;

        // ── pick a new turnTarget every 0.8–2.6s for organic variation ──
        if (now >= this.nextDrift) {
          this.turnTarget = (Math.random() - 0.5) * this.maxTurnRate * 2;
          this.nextDrift  = now + (0.8 + Math.random() * 1.8) * 1000;
        }

        // ── apply continuous banking to heading ──
        this.heading = normAngle(this.heading + this.turnRate * dt);

        // ── move ──
        this.x += Math.cos(this.heading) * this.speed * dt;
        this.y += Math.sin(this.heading) * this.speed * dt;

        // ── sample trail at ~30 pts / sec ──
        this.sampleTimer += dt;
        if (this.sampleTimer >= 1 / 30) {
          this.trail.push({ x: this.x, y: this.y, t: now });
          this.sampleTimer = 0;
        }

        // ── prune expired trail points ──
        const cutoff = now - TRAIL_LIFE;
        while (this.trail.length && this.trail[0].t < cutoff) this.trail.shift();

        // ── off-screen tracking ──
        const W = canvas.width, H = canvas.height;
        const pad = 120;
        if (this.x < -pad || this.x > W + pad || this.y < -pad || this.y > H + pad) {
          this.offscreenMs += dt * 1000;
          if (this.offscreenMs > TRAIL_LIFE + 1000) this.alive = false;
        } else {
          this.offscreenMs = 0;
        }
      }

      draw(ctx, now) {
        // ── smoke trail: two-pass continuous line — wide+soft outer layer plus
        //    narrower inner core, both fading with age like real exhaust ──
        if (this.trail.length >= 2) {
          const CHUNK = 6; // small chunks so width tapers smoothly along the trail
          for (let pass = 0; pass < 2; pass++) {
            for (let i = 0; i < this.trail.length - 1; i += CHUNK) {
              const end = Math.min(i + CHUNK, this.trail.length - 1);
              const midIdx = Math.floor((i + end) / 2);
              const age = Math.min(1, (now - this.trail[midIdx].t) / TRAIL_LIFE);
              const fresh = 1 - age; // 1 = just emitted, 0 = fully faded

              let op, lw;
              if (pass === 0) {
                // outer haze: wide, very transparent — gives the smoke body
                op = fresh * fresh * 0.10;
                lw = 1.5 + fresh * 9; // 10.5 px near jet → 1.5 px at tail
              } else {
                // inner core: narrower, slightly denser — gives the wispy centre
                op = fresh * fresh * 0.22;
                lw = 0.5 + fresh * 3; // 3.5 px near jet → 0.5 px at tail
              }
              if (op < 0.004) continue;

              ctx.beginPath();
              ctx.moveTo(this.trail[i].x, this.trail[i].y);
              for (let j = i + 1; j <= end; j++) {
                ctx.lineTo(this.trail[j].x, this.trail[j].y);
              }
              ctx.strokeStyle = `rgba(215,218,222,${op.toFixed(3)})`;
              ctx.lineWidth   = lw;
              ctx.lineCap     = 'round';
              ctx.lineJoin    = 'round';
              ctx.stroke();
            }
          }
        }

        // ── jet body (only near viewport) — F-14 Tomcat grey ──
        const W = canvas.width, H = canvas.height;
        if (this.x > -60 && this.x < W + 60 && this.y > -60 && this.y < H + 60) {
          ctx.save();
          ctx.translate(this.x, this.y);
          ctx.rotate(this.heading);
          ctx.fillStyle   = '#9aa4ac';
          ctx.shadowColor = 'rgba(180,190,200,0.45)';
          ctx.shadowBlur  = 5;
          drawJetShape(ctx);
          ctx.restore();
        }
      }
    }

    // ── main loop ──
    const jets = [];
    let last    = performance.now();

    // spawn first jet almost immediately
    let nextSpawn = performance.now() + (1 + Math.random() * 2) * 1000;

    function loop(now) {
      const dt = Math.min((now - last) / 1000, 0.1);
      last = now;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // spawn
      const alive = jets.filter(j => j.alive).length;
      if (now >= nextSpawn && alive < MAX_JETS) {
        jets.push(new Jet(now));
        nextSpawn = now + (6 + Math.random() * 8) * 1000;
      }

      // cull dead jets
      for (let i = jets.length - 1; i >= 0; i--) {
        if (!jets[i].alive) jets.splice(i, 1);
      }

      // update + draw
      for (const jet of jets) {
        jet.update(dt, now);
        jet.draw(ctx, now);
      }

      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  })();
  // ── END JET ANIMATION ──────────────────────────────────────────────────────
</script>

<!-- ── CHAT PANEL ─────────────────────────────────────────────────────── -->
<button id="chat-toggle">⌘ COMMS</button>

<div id="chat-panel">
  <div id="chat-header">
    <span>▸ COMMS CHANNEL</span>
    <button id="chat-close">[ ESC ]</button>
  </div>
  <div id="chat-messages"></div>
  <div id="chat-input-row">
    <span>›</span>
    <input id="chat-input" type="text" placeholder="ask goose anything…" autocomplete="off" spellcheck="false">
    <button id="chat-send">SEND</button>
  </div>
</div>

<script>
  // ── CHAT ──────────────────────────────────────────────────────────────────
  (function () {
    const panel    = document.getElementById('chat-panel');
    const toggle   = document.getElementById('chat-toggle');
    const closeBtn = document.getElementById('chat-close');
    const messages = document.getElementById('chat-messages');
    const input    = document.getElementById('chat-input');
    const sendBtn  = document.getElementById('chat-send');

    let history   = [];   // [{role, content}] — full conversation
    let streaming = false;

    function openPanel() {
      panel.classList.add('open');
      toggle.classList.add('active');
      // show greeting on first open
      if (history.length === 0) {
        appendMsg('goose', 'GOOSE online. What\'s your query?');
      }
      setTimeout(() => input.focus(), 350);
    }

    function closePanel() {
      panel.classList.remove('open');
      toggle.classList.remove('active');
    }

    toggle.addEventListener('click', () =>
      panel.classList.contains('open') ? closePanel() : openPanel()
    );
    closeBtn.addEventListener('click', closePanel);

    // Cmd/Ctrl+K to toggle, Escape to close
    document.addEventListener('keydown', e => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        panel.classList.contains('open') ? closePanel() : openPanel();
      }
      if (e.key === 'Escape' && panel.classList.contains('open')) closePanel();
    });

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
    sendBtn.addEventListener('click', send);

    function appendMsg(role, text) {
      const wrap   = document.createElement('div');
      wrap.className = `chat-msg ${role}`;
      const label  = document.createElement('div');
      label.className = 'chat-label';
      label.textContent = role === 'goose' ? 'GOOSE' : 'YOU';
      const bubble = document.createElement('div');
      bubble.className = 'chat-bubble';
      bubble.textContent = text;
      wrap.appendChild(label);
      wrap.appendChild(bubble);
      messages.appendChild(wrap);
      messages.scrollTop = messages.scrollHeight;
      return bubble;
    }

    async function send() {
      const text = input.value.trim();
      if (!text || streaming) return;

      input.value = '';
      appendMsg('user', text);
      history.push({ role: 'user', content: text });

      // placeholder bubble with blinking cursor
      const bubble = appendMsg('goose', '');
      const cursor = document.createElement('span');
      cursor.className = 'chat-cursor';
      bubble.appendChild(cursor);

      sendBtn.disabled = true;
      input.disabled   = true;
      streaming        = true;

      let reply = '';

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history }),
        });

        const reader  = res.body.getReader();
        const decoder = new TextDecoder();
        let   buf     = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const lines = buf.split('\n');
          buf = lines.pop();
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const raw = line.slice(6);
            if (raw === '[DONE]') break;
            try {
              const parsed = JSON.parse(raw);
              if (parsed.text) {
                reply += parsed.text;
                bubble.textContent = reply;
                bubble.appendChild(cursor);
                messages.scrollTop = messages.scrollHeight;
              }
            } catch {}
          }
        }
      } catch (err) {
        bubble.textContent = 'COMMS ERROR — ' + err.message;
      }

      cursor.remove();
      history.push({ role: 'assistant', content: reply });
      sendBtn.disabled = false;
      input.disabled   = false;
      streaming        = false;
      input.focus();
    }
  })();
  // ── END CHAT ───────────────────────────────────────────────────────────────
</script>
</body>
</html>
