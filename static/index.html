<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOOSE</title>
  <style>
    :root {
      --bg:       #06080c;
      --surface:  #0a0e15;
      --card:     #0d1219;
      --border:   #18222e;
      --cyan:     #00d4ff;
      --cyan-dim: #006f88;
      --cyan-glow:rgba(0,212,255,0.12);
      --amber:    #ffaa00;
      --amber-dim:#7a5000;
      --red:      #ff3355;
      --green:    #00ff99;
      --text:     #9ab4cc;
      --text-dim: #2e4456;
      --text-hi:  #d4e8ff;
      --mono:     'SF Mono','Fira Code','Courier New',monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* Scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px
      );
      pointer-events: none;
      z-index: 9998;
    }

    .wrap {
      position: relative;
      z-index: 1;
      padding: 22px 32px 36px;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 22px;
    }

    .logo-group { display: flex; align-items: center; gap: 14px; }

    .diamond {
      width: 10px; height: 10px;
      background: var(--cyan);
      transform: rotate(45deg);
      box-shadow: 0 0 16px var(--cyan), 0 0 32px var(--cyan-glow);
      flex-shrink: 0;
    }

    .logo-text {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.28em;
      color: var(--cyan);
      text-shadow: 0 0 24px var(--cyan-glow);
    }

    .logo-sub {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-top: 3px;
    }

    .header-right { display: flex; align-items: center; gap: 32px; }

    .sys-status {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: breathe 2.4s ease-in-out infinite;
    }
    .status-dot.warn   { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
    .status-dot.error  { background: var(--red);   box-shadow: 0 0 8px var(--red); animation: none; }

    @keyframes breathe {
      0%,100% { opacity:1; box-shadow: 0 0 8px var(--green); }
      50%      { opacity:.5; box-shadow: 0 0 3px var(--green); }
    }

    .clock {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text);
      letter-spacing: 0.1em;
    }

    /* ── PANEL ── */
    .panel {
      position: relative;
      background: var(--card);
      border: 1px solid var(--border);
      padding: 20px 24px;
    }

    /* Corner brackets */
    .panel::before { content:''; position:absolute; top:-1px;    left:-1px;  width:14px; height:14px; border-top:2px solid var(--cyan); border-left:2px solid var(--cyan); }
    .panel::after  { content:''; position:absolute; bottom:-1px; right:-1px; width:14px; height:14px; border-bottom:2px solid var(--cyan); border-right:2px solid var(--cyan); }
    .panel .c-tr   { position:absolute; top:-1px;    right:-1px; width:14px; height:14px; border-top:2px solid var(--cyan); border-right:2px solid var(--cyan); }
    .panel .c-bl   { position:absolute; bottom:-1px; left:-1px;  width:14px; height:14px; border-bottom:2px solid var(--cyan); border-left:2px solid var(--cyan); }

    .panel-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--cyan-dim);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .panel-label::after { content:''; flex:1; height:1px; background: var(--border); }

    /* ── BRIEF ── */
    .brief-panel { margin-bottom: 20px; }

    .brief-text {
      font-size: 26px;
      font-weight: 300;
      color: var(--text-hi);
      line-height: 1.45;
      letter-spacing: 0.01em;
      margin-bottom: 20px;
    }

    .brief-readouts {
      display: flex;
      gap: 40px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .readout { display: flex; flex-direction: column; gap: 5px; }
    .readout-label { font-family: var(--mono); font-size: 8px; letter-spacing: 0.2em; color: var(--text-dim); text-transform: uppercase; }
    .readout-value { font-family: var(--mono); font-size: 14px; color: var(--cyan); letter-spacing: 0.05em; }

    .loading-state {
      padding: 44px 0;
      text-align: center;
    }
    .loading-state p {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text-dim);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      animation: flicker 1.4s step-end infinite;
    }
    @keyframes flicker { 0%,100%{opacity:1} 50%{opacity:.15} }

    /* ── DATA GRID ── */
    .data-grid {
      display: grid;
      grid-template-columns: 1.3fr 1fr 1fr;
      gap: 18px;
    }
    @media (max-width: 860px) { .data-grid { grid-template-columns: 1fr; } }

    /* ── ASSIGNMENTS ── */
    .a-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
    }
    .a-row:last-child { border-bottom: none; }

    .badge {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 7px;
      border: 1px solid;
      min-width: 72px;
      text-align: center;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .b-crit { color:var(--red);   border-color:var(--red);   background:rgba(255,51,85,.07);  box-shadow:0 0 10px rgba(255,51,85,.15); animation: pulse-red 2s ease-in-out infinite; }
    .b-high { color:var(--amber); border-color:var(--amber); background:rgba(255,170,0,.07); }
    .b-elev { color:#cc7700;      border-color:#442200; }
    .b-mod  { color:var(--cyan-dim); border-color:#0a2a33; }
    .b-rout { color:var(--text-dim); border-color:var(--border); }

    @keyframes pulse-red {
      0%,100% { box-shadow:0 0 10px rgba(255,51,85,.15); }
      50%      { box-shadow:0 0 18px rgba(255,51,85,.35); }
    }

    .a-info { flex:1; min-width:0; }
    .a-name { font-size:13px; color:var(--text); line-height:1.3; margin-bottom:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .a-due  { font-family:var(--mono); font-size:10px; color:var(--text-dim); letter-spacing:.06em; }
    .a-due.crit { color:var(--red); }
    .a-due.high { color:var(--amber); }

    /* ── SCHEDULE ── */
    .e-row {
      display: flex;
      gap: 14px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      align-items: flex-start;
    }
    .e-row:last-child { border-bottom: none; }
    .e-time { font-family:var(--mono); font-size:11px; color:var(--cyan-dim); min-width:48px; flex-shrink:0; padding-top:2px; letter-spacing:.06em; }
    .e-title { font-size:13px; color:var(--text); line-height:1.3; }

    /* ── FREE BLOCKS ── */
    .b-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .b-row:last-child { border-bottom: none; }
    .b-time  { font-family:var(--mono); font-size:11px; color:var(--text); letter-spacing:.04em; min-width:120px; flex-shrink:0; }
    .b-track { flex:1; height:2px; background:var(--border); }
    .b-fill  { height:100%; background:var(--cyan); box-shadow:0 0 6px var(--cyan); }
    .b-hrs   { font-family:var(--mono); font-size:11px; color:var(--green); letter-spacing:.06em; min-width:28px; text-align:right; }

    .empty {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: .14em;
      text-transform: uppercase;
      padding: 10px 0;
    }

    /* ── FOOTER ── */
    .footer {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: .12em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo-group">
      <div class="diamond"></div>
      <div>
        <div class="logo-text">GOOSE</div>
        <div class="logo-sub">Personal Co-Pilot · v1.0</div>
      </div>
    </div>
    <div class="header-right">
      <div class="sys-status">
        <div class="status-dot" id="sys-dot"></div>
        <span id="sys-label">Nominal</span>
      </div>
      <div class="clock" id="clock"></div>
    </div>
  </header>

  <div class="panel brief-panel" id="brief-panel">
    <div class="c-tr"></div><div class="c-bl"></div>
    <div id="brief"></div>
  </div>

  <div class="data-grid">
    <div class="panel"><div class="c-tr"></div><div class="c-bl"></div>
      <div class="panel-label">Assignments</div>
      <div id="assignments"></div>
    </div>
    <div class="panel"><div class="c-tr"></div><div class="c-bl"></div>
      <div class="panel-label">Schedule</div>
      <div id="events"></div>
    </div>
    <div class="panel"><div class="c-tr"></div><div class="c-bl"></div>
      <div class="panel-label">Free Blocks</div>
      <div id="blocks"></div>
    </div>
  </div>

  <div class="footer">
    <span>Local · ASU Canvas + Google Calendar</span>
    <span id="last-update"></span>
  </div>

</div>
<script>
  const $ = id => document.getElementById(id);

  // Live clock
  const DAYS  = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const MONTHS= ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  function tick() {
    const n = new Date();
    $('clock').textContent =
      `${DAYS[n.getDay()]} ${String(n.getDate()).padStart(2,'0')} ${MONTHS[n.getMonth()]} ${n.getFullYear()}` +
      `  ·  ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;
  }
  tick(); setInterval(tick, 1000);

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function badge(days) {
    if (days <= 0) return ['CRITICAL','b-crit'];
    if (days === 1) return ['HIGH','b-high'];
    if (days <= 3) return ['ELEVATED','b-elev'];
    if (days <= 7) return ['MODERATE','b-mod'];
    return ['ROUTINE','b-rout'];
  }

  function dueStr(days) {
    if (days < 0)  return `T${days}  OVERDUE`;
    if (days === 0) return 'T+0  DUE TODAY';
    if (days === 1) return 'T+1  TOMORROW';
    return `T+${days}  DAYS OUT`;
  }

  function dueClass(days) {
    if (days <= 0) return 'crit';
    if (days <= 1) return 'high';
    return '';
  }

  function fmtTime(iso) {
    if (!iso || !iso.includes('T')) return '';
    try {
      const d = new Date(iso);
      return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    } catch { return ''; }
  }

  function render(data) {
    const dot = $('sys-dot'), lbl = $('sys-label');

    if (data.status === 'loading') {
      dot.className = 'status-dot warn';
      lbl.textContent = 'Initializing';
      $('brief').innerHTML = `<div class="loading-state"><p>Acquiring data streams_</p></div>`;
      ['assignments','events','blocks'].forEach(id => $(id).innerHTML = '');
      return;
    }

    if (data.status === 'error') {
      dot.className = 'status-dot error';
      lbl.textContent = 'System Error';
    } else {
      dot.className = 'status-dot';
      lbl.textContent = 'Nominal';
    }

    // Brief
    const h = data.headline;
    if (h?.headline) {
      $('brief').innerHTML = `
        <div class="panel-label">Mission Brief</div>
        <div class="brief-text">${esc(h.headline)}</div>
        <div class="brief-readouts">
          ${h.priority_task   ? `<div class="readout"><div class="readout-label">Priority Target</div><div class="readout-value">${esc(h.priority_task)}</div></div>` : ''}
          ${h.suggested_block ? `<div class="readout"><div class="readout-label">Suggested Window</div><div class="readout-value">${esc(h.suggested_block)}</div></div>` : ''}
        </div>`;
    } else {
      $('brief').innerHTML = `<div class="panel-label">Mission Brief</div><div class="empty">No recommendation computed</div>`;
    }

    // Assignments
    const asgn = data.assignments || [];
    $('assignments').innerHTML = asgn.length === 0
      ? `<div class="empty">No assignments on deck</div>`
      : asgn.map(a => {
          const [lbl, cls] = badge(a.days_until_due);
          return `<div class="a-row">
            <div class="badge ${cls}">${lbl}</div>
            <div class="a-info">
              <div class="a-name">${esc(a.name)}</div>
              <div class="a-due ${dueClass(a.days_until_due)}">${dueStr(a.days_until_due)}</div>
            </div>
          </div>`;
        }).join('');

    // Events
    const evts = data.events || [];
    $('events').innerHTML = evts.length === 0
      ? `<div class="empty">No events scheduled</div>`
      : evts.map(e => `
          <div class="e-row">
            <div class="e-time">${fmtTime(e.start)}</div>
            <div class="e-title">${esc(e.title)}</div>
          </div>`).join('');

    // Free blocks
    const blks = data.free_blocks || [];
    const maxH = Math.max(...blks.map(b => b.hours), 1);
    $('blocks').innerHTML = blks.length === 0
      ? `<div class="empty">No free blocks today</div>`
      : blks.map(b => `
          <div class="b-row">
            <div class="b-time">${esc(b.start)} – ${esc(b.end)}</div>
            <div class="b-track"><div class="b-fill" style="width:${Math.round(b.hours/maxH*100)}%"></div></div>
            <div class="b-hrs">${b.hours}h</div>
          </div>`).join('');

    // Footer timestamp
    if (data.generated_at) {
      const d = new Date(data.generated_at);
      $('last-update').textContent = `Last sync  ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }
  }

  async function poll() {
    try {
      render(await (await fetch('/api/data')).json());
    } catch {
      $('sys-dot').className = 'status-dot error';
      $('sys-label').textContent = 'Offline';
    }
  }

  poll();
  setInterval(poll, 60_000);
</script>
</body>
</html>
